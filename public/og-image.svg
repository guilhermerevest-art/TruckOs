<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="0.5" stop-color="#0284C7"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Pattern -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="300" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="500" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="700" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="900" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="1100" cy="100" r="2" fill="#FFFFFF"/>
    <circle cx="100" cy="530" r="2" fill="#FFFFFF"/>
    <circle cx="300" cy="530" r="2" fill="#FFFFFF"/>
    <circle cx="500" cy="530" r="2" fill="#FFFFFF"/>
    <circle cx="700" cy="530" r="2" fill="#FFFFFF"/>
    <circle cx="900" cy="530" r="2" fill="#FFFFFF"/>
    <circle cx="1100" cy="530" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Caminhao grande -->
  <g transform="translate(120, 240) scale(2)">
    <path d="M20 60 L20 32 L80 32 L96 48 L96 90 L20 90 Z" fill="#FFFFFF"/>
    <rect x="96" y="32" width="60" height="58" fill="#FFFFFF"/>
    <rect x="20" y="74" width="136" height="6" fill="url(#accent)"/>
    <circle cx="40" cy="94" r="8" fill="#0F172A"/>
    <circle cx="40" cy="94" r="3" fill="#94A3B8"/>
    <circle cx="128" cy="94" r="8" fill="#0F172A"/>
    <circle cx="128" cy="94" r="3" fill="#94A3B8"/>
    <!-- janela -->
    <rect x="30" y="40" width="40" height="16" fill="url(#bg)" opacity="0.4"/>
  </g>

  <!-- Texto -->
  <text x="500" y="240" font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">TruckOS</text>
  <text x="500" y="320" font-family="system-ui, sans-serif" font-size="32" font-weight="500" fill="#FFFFFF" opacity="0.9">Sua oficina de caminhoes no controle.</text>
  <text x="500" y="365" font-family="system-ui, sans-serif" font-size="32" font-weight="500" fill="#FFFFFF" opacity="0.9">Do patio ao caixa.</text>

  <!-- Badge -->
  <rect x="500" y="420" width="380" height="56" rx="28" fill="#FFFFFF" opacity="0.15"/>
  <text x="690" y="455" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">30 DIAS GRATIS  ·  SEM CARTAO</text>

  <!-- Faixa amarela -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)"/>
</svg>